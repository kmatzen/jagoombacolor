name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
    - uses: actions/checkout@v4

    - name: Build
      run: make
      env:
        DEVKITARM: /opt/devkitpro/devkitARM

    - name: Upload GBA binary
      uses: actions/upload-artifact@v4
      with:
        name: jagoombacolor.gba
        path: jagoombacolor.gba

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download GBA binary
      uses: actions/download-artifact@v4
      with:
        name: jagoombacolor.gba

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libelf-dev libpng-dev \
          libsqlite3-dev libedit-dev python3-pip
        pip3 install --break-system-packages Pillow

    - name: Build mGBA library (static)
      run: |
        git clone --depth 1 https://github.com/mgba-emu/mgba.git /tmp/mgba-build
        mkdir -p /tmp/mgba-build/build
        cd /tmp/mgba-build/build
        cmake .. -DBUILD_QT=OFF -DBUILD_SDL=OFF -DBUILD_SHARED=OFF -DBUILD_STATIC=ON \
          -DUSE_LIBZIP=OFF -DUSE_MINIZIP=OFF -DUSE_EPOXY=OFF -DUSE_FFMPEG=OFF \
          -DUSE_DISCORD_RPC=OFF -DUSE_LUA=OFF
        make -j$(nproc)

    - name: Debug mGBA build config
      run: |
        echo "=== flags.h ==="
        cat /tmp/mgba-build/build/include/mgba/flags.h
        echo "=== libraries ==="
        ls /tmp/mgba-build/build/libmgba*
        echo "=== COLOR_16_BIT check ==="
        grep -r 'COLOR_16_BIT' /tmp/mgba-build/build/include/ || echo "not found"

    - name: Build test runner (static link)
      run: |
        cc -O2 -g \
          -I/tmp/mgba-build/include -I/tmp/mgba-build/build/include -I/tmp/mgba-build/src \
          -include /tmp/mgba-build/build/include/mgba/flags.h \
          -DM_CORE_GB -DM_CORE_GBA \
          -o test_roms/mgba_runner test_roms/mgba_runner.c \
          /tmp/mgba-build/build/libmgba.a \
          -lpthread -ldl -lm -lpng -lz -lsqlite3 -ledit -lelf

    - name: Smoke test mgba_runner with backtrace
      run: |
        python3 test_roms/goomba_compile.py -e jagoombacolor.gba -o /tmp/smoke.gba test_roms/ei_delay_test.gb
        ulimit -c unlimited
        test_roms/mgba_runner /tmp/smoke.gba 10 /tmp/smoke.bmp 2>&1 || true
        if [ -f core* ]; then gdb -batch -ex "bt full" test_roms/mgba_runner core*; fi

    - name: Run custom ROM visual tests
      run: |
        # Run only tests that use custom (non-commercial) ROMs
        python3 test_roms/run_tests.py \
          -t ei_delay_test \
          -t halt_bug_test \
          -t jr_hram_test \
          -t rst_timing_test \
          -t sprite_limit_test \
          -t timer_accuracy_test

    - name: Run RST timing test
      run: python3 test_roms/test_rst_timing.py
