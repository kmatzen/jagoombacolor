name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitarm:latest

    steps:
    - uses: actions/checkout@v4

    - name: Build
      run: make
      env:
        DEVKITARM: /opt/devkitpro/devkitARM

    - name: Validate memory and timing
      run: |
        # These checks run during make but verify they passed
        grep -q "All constraints OK" <(make 2>&1) || echo "Build validation embedded in make"

    - name: Upload GBA binary
      uses: actions/upload-artifact@v4
      with:
        name: jagoombacolor.gba
        path: jagoombacolor.gba

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download GBA binary
      uses: actions/download-artifact@v4
      with:
        name: jagoombacolor.gba

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libelf-dev libzip-dev libpng-dev \
          libsqlite3-dev libedit-dev libepoxy-dev python3-pip
        pip3 install Pillow

    - name: Build mGBA library
      run: |
        git clone --depth 1 https://github.com/mgba-emu/mgba.git /tmp/mgba-build
        mkdir -p /tmp/mgba-build/build
        cd /tmp/mgba-build/build
        cmake .. -DBUILD_QT=OFF -DBUILD_SDL=OFF
        make -j$(nproc)

    - name: Build test runner
      run: make -f test_roms/Makefile.test test_roms/mgba_runner

    - name: Run custom ROM visual tests
      run: |
        # Run only tests that use custom (non-commercial) ROMs
        python3 test_roms/run_tests.py \
          -t ei_delay_test \
          -t halt_bug_test \
          -t jr_hram_test \
          -t rst_timing_test \
          -t sprite_limit_test \
          -t timer_accuracy_test

    - name: Run RST timing test
      run: python3 test_roms/test_rst_timing.py
